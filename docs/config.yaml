    title: "The CARWatch Framework Ecosystem"
    intro_text: "The CARWatch ecosystem consists of the following components:"
    items:
      - icon_src: "/brand/android.svg"
        title: "Android App"
        description: "The current smartphone app for reminders, awakening reports, and barcode-based recording of sampling events. Available on Google Play."
        url: https://play.google.com/store/apps/details?id=de.fau.cs.mad.carwatch
      - icon_src: "/brand/apple.svg"
        title: "iOS App"
        description: "An iOS version is under development to extend the same workflow to Apple devices."
        url: /components/#ios-app
      - icon_src: "/brand/globe.svg"
        title: "Web Configurator"
        description: "Browser-based study configuration, generation of study materials, and processing of exported log files."
        url: /components/#web-configurator
      # - emoji: "🏷️"
      #   title: "Study materials"
      #   description: "Barcodes and QR codes can be prepared in advance and distributed with sampling materials."
      # - emoji: "📊"
      #   title: "Structured output"
      #   description: "Exported CARWatch logs can be transformed into structured datasets for downstream analyses."
  workflow:
    intro_text: "The typical workflow of using <strong>CARWatch</strong> is the following:"
    steps:
      - title: "Configure the study"
        text: "Define the study settings in the web configurator."
      - title: "Prepare study materials"
        text: "Generate barcodes and QR codes and distribute them to the participants along with all other study materials."
      - title: "Download and initialize the app"
        text: "Study participants download the Android app from Google Play and configure it by scanning the QR code."
      - title: "Use the app"
        text: "Study participants use the app during data collection to report awakening and record saliva sample intake."
      - title: "Share and process the exported logs"
        text: "After the study, participants share log files with the study personnel. Afterwards, the log files can be processed locally in the web configurator without storing any data on servers!"
    image:
      src: "/img/carwatch_overview.png"
      alt: "Overview of the CARWatch workflow from study preparation to data processing"
      max_width: "760px"
  contact:
    title: "Contact"
    text: "Interested in using CARWatch in your own study or research project? Contact us at"
    email: "robert.richer@fau.de"
  text_blocks:
    - id: "what-is-carwatch"
      title: "What is CARWatch?"
      content: "<p><strong>CARWatch</strong> is an open-source framework for supporting <strong>saliva sampling field studies</strong>. It combines mobile applications for <strong>Android</strong> and <strong>iOS</strong> used during data collection with a <strong>study configurator website</strong>.</p><p>The framework was originally developed as a single Android app for <strong>cortisol awakening response (CAR)</strong> research and has since been expanded into a broader <strong>cross-platform ecosystem</strong> for studies in which saliva samples are collected in the field.</p>"
      alignment: "left"
      max_width: "900px"
      order: 1
    - id: "why-carwatch"
      title: "Why CARWatch?"
      content: "<p>The <strong>cortisol awakening response</strong> is a widely used marker in psychoneuroendocrine research, but its assessment is <strong>highly time-critical</strong>. Even short delays between awakening and sampling can systematically distort <strong>CAR estimates</strong> and contribute to inconsistent findings in field studies.</p><p>CARWatch was developed to support <strong>more objective recording</strong> of sample events outside the lab. <strong>Barcode scans</strong> document sample events with timestamps, <strong>automated reminders</strong> support protocol adherence, and <strong>QR codes</strong> transfer predefined study settings to the app.</p>"
      alignment: "left"
      max_width: "900px"
      order: 2
    - id: "workflow"
      title: "Workflow"
      content: ""
      alignment: "left"
      max_width: "900px"
      order: 3
