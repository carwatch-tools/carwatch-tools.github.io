    title: "The CARWatch Framework Ecosystem"
    intro_text: "The CARWatch ecosystem consists of the following components:"
    items:
      - icon_src: "/brand/globe.svg"
        title: "Study Manager"
        description: "A web-based study manager for study setup, generation of study materials, and processing of exported log files. Available online."
