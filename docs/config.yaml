  text_blocks:
    - id: "why-carwatch"
      title: "Why CARWatch"
      content: "<p>The cortisol awakening response is a widely used marker in psychoneuroendocrine research, but its assessment is highly time-critical. Even short delays between awakening and sampling can systematically distort CAR estimates and contribute to inconsistent findings in field studies.</p><p>CARWatch was developed to support more objective recording of sample events outside the lab. Barcode scans document sample events with timestamps, automated reminders support protocol adherence, and QR codes transfer predefined study settings to the app.</p>"
      alignment: "left"
      max_width: "900px"
      order: 1
    - id: "what-is-carwatch"
      title: "What is CARWatch"
      content: "<p>CARWatch is an open-source framework for saliva sampling studies in real-world settings. It combines mobile applications for Android and iOS used during data collection with a website for study preparation, barcode and QR-code generation, and processing of exported log files.</p><p>The framework was originally developed as a single Android app for cortisol awakening response research and has since expanded into a broader cross-platform workflow for all kinds of studies where saliva samples are collected in the field.</p>"
      alignment: "left"
      max_width: "900px"
      order: 2
    - id: "workflow"
      title: "Workflow"
      content: "<p>Researchers can configure a study, generate labeled sampling materials, initialize the mobile app through QR codes, document sample events during data collection, and process exported log files after the study. In the web interface, these processing steps can remain client-side in the browser.</p><p><img src=\"/img/carwarch_overview.png\" alt=\"Overview of the CARWatch workflow from study preparation to data processing\"></p>"
      alignment: "left"
      max_width: "1000px"
      order: 3
    - id: "where-next"
      title: "Where to Go Next"
      content: "<ul><li><a href=\"/resources/\">Resources</a> for links to the web configurator, Android app, iOS app, publication, and repository.</li><li><a href=\"/overview/\">Overview</a> for the conceptual background and methodological motivation.</li><li><a href=\"/components/\">Components</a> for the role of the mobile apps, web tools, study materials, and log processing.</li><li><a href=\"/publication/\">Publication</a> for the primary paper and scientific context.</li></ul>"
      alignment: "left"
      max_width: "900px"
      order: 4

