title: CARWatch
description: Open-source framework for objective saliva sampling studies, including mobile apps, web-based study preparation, and log processing.
author: CARWatch Project
base_url: ""

theme: default
dark_mode: false

enable_llms: true
enable_search: true
clean_urls: true

stale_warning:
  enabled: false
  threshold_days: 365
  show_update_date: true

landing:
  enabled: true
  nav:
    - text: Overview
      url: /overview/
    - text: Components
      url: /components/
    - text: Resources
      url: /resources/
    - text: Publication
      url: /publication/
    - text: News
      url: /news/
    - text: Privacy
      url: /privacy/
  hero:
    title: "CARWatch"
    subtitle: "An open-source framework for objective saliva sampling studies."
    buttons:
      - text: "Project Overview"
        url: /overview/
        primary: true
      - text: "View on GitHub"
        url: https://github.com/mad-lab-fau/carwatch
        primary: false
  features:
    title: "Components"
    items:
      - emoji: "~"
        title: "Mobile apps"
        description: "Participant-facing applications for reminders, barcode-based sample logging, and study setup through QR codes."
      - emoji: "@"
        title: "Web interface"
        description: "Browser-based tools for study configuration, barcode and QR-code generation, and log processing."
      - emoji: "#"
        title: "Study materials"
        description: "Barcodes and QR codes can be prepared in advance and distributed with study materials."
      - emoji: "$"
        title: "Log processing"
        description: "Exported CARWatch logs can be transformed into structured datasets for downstream analyses."
  text_blocks:
    - id: "background"
      title: "Background"
      content: "<p>CARWatch was first introduced to improve the accuracy of cortisol awakening response sampling by combining barcode scans with automated reminders. Since its first release, it has evolved from a single Android application into a broader framework for saliva sampling studies.</p><p>The framework now supports study configuration, preparation of study materials, participant support during data collection, and processing of the resulting log files.</p>"
      alignment: "left"
      max_width: "900px"
      order: 1
    - id: "workflow"
      title: "Workflow"
      content: "<p>Researchers can configure a study, generate barcodes and QR codes, distribute study materials, collect objective sampling timestamps through the mobile app, and process exported log files after the study.</p><p><img src=\"/img/carwarch_overview.png\" alt=\"Overview of the CARWatch workflow from study preparation to data processing\"></p>"
      alignment: "left"
      max_width: "1000px"
      order: 2
