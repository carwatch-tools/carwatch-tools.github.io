      - icon_src: "/brand/android.svg"
        title: "Android App"
        description: "The Android app for reminders, awakening reports, and barcode-based recording of sampling events. Available on Google Play."
        url: https://play.google.com/store/apps/details?id=de.fau.cs.mad.carwatch
      - icon_src: "/brand/apple.svg"
        title: "iOS App"
        description: "The iOS app for reminders, awakening reports, and barcode-based recording of sampling events. Available on the App Store."
        url: https://apps.apple.com/de/app/carwatchapp/id6761441417
      # - emoji: "🏷️"
