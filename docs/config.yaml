      #   description: "Barcodes and QR codes can be prepared in advance and distributed with sampling materials."
      # - emoji: "📊"
      #   title: "Structured output"
      #   description: "Exported CARWatch logs can be transformed into structured datasets for downstream analyses."
  workflow:
    intro_text: "The typical workflow of using <strong>CARWatch</strong> is the following:"
    steps:
      - title: "Configure the study"
        text: "Define the study settings in the web-based Study Manager."
      - title: "Prepare study materials"
        text: "Generate barcodes and QR codes and distribute them to the participants along with all other study materials."
      - title: "Download and initialize the app"
        text: "Study participants download the app from Google Play or the App Store and configure it by scanning the QR code."
      - title: "Use the app"
        text: "Study participants use the app during data collection to report awakening and record saliva sample intake."
      - title: "Share and process the exported logs"
        text: "After the study, participants share log files with the study personnel. Afterwards, the log files can be processed locally in the web-based Study Manager without storing any data on servers!"
    image:
      src: "/img/carwatch_overview.png"
      alt: "Overview of the CARWatch workflow from study preparation to data processing"
      max_width: "760px"
  contact:
    title: "Contact"
    text: "Interested in using CARWatch in your own study or research project? Contact us at"
    email: "robert.richer@fau.de"
  text_blocks:
    - id: "news"
      title: "News"
      content: "<div class=\"news-callout\"><div class=\"news-meta\"><span>Release</span><time datetime=\"2026-06-30\">2026-06-30</time></div><h3>CARWatch Android app updated to v3.0.1</h3><p>The CARWatch Android app now has a refreshed design and updated participant workflows. The new release adds a study-details step during onboarding, clearer navigation, daily alarm and sample status overviews, pending wake-up and end-of-day alerts, and support for bedtime/evening sample reminders.</p><img class=\"news-image\" src=\"/img/img_android_app.png\" alt=\"Updated CARWatch Android app screens\"><a class=\"news-link\" href=\"https://play.google.com/store/apps/details?id=de.fau.cs.mad.carwatch\">Get it on Google Play</a></div><div class=\"news-callout\"><div class=\"news-meta\"><span>Release</span><time datetime=\"2026-06-04\">2026-06-04</time></div><h3>CARWatch iOS app released</h3><p>The CARWatch iOS app is now available on the App Store! Let us know if you have any feedback or questions.</p><a class=\"news-link\" href=\"https://apps.apple.com/de/app/carwatchapp/id6761441417\">Download on the App Store</a></div>"
      alignment: "left"
      max_width: "900px"
      order: 1
    - id: "what-is-carwatch"
      title: "What is CARWatch?"
      content: "<p><strong>CARWatch</strong> is an open-source framework for supporting <strong>saliva sampling field studies</strong>. It combines mobile applications for <strong>Android</strong> and <strong>iOS</strong> used during data collection with a <strong>web-based Study Manager</strong>.</p><p>The framework was originally developed as a single Android app for <strong>cortisol awakening response (CAR)</strong> research and has since been expanded into a broader <strong>cross-platform ecosystem</strong> for studies in which saliva samples are collected in the field.</p>"
      alignment: "left"
      max_width: "900px"
      order: 2
    - id: "why-carwatch"
      title: "Why CARWatch?"
      content: "<p>The <strong>cortisol awakening response</strong> is a widely used marker in psychoneuroendocrine research, but its assessment is <strong>highly time-critical</strong>. Even short delays between awakening and sampling can systematically distort <strong>CAR estimates</strong> and contribute to inconsistent findings in field studies.</p><p>CARWatch was developed to support <strong>more objective recording</strong> of sample events outside the lab. <strong>Barcode scans</strong> document sample events with timestamps, <strong>automated reminders</strong> support protocol adherence, and <strong>QR codes</strong> transfer predefined study settings to the app.</p>"
      alignment: "left"
      max_width: "900px"
      order: 3
    - id: "workflow"
      title: "Workflow"
      content: ""
      alignment: "left"
      max_width: "900px"
      order: 4
