name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Install MinimalDoc
        run: go install github.com/studiowebux/minimaldoc/cmd/minimaldoc@latest

      - name: Build Documentation
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            BASE_URL="https://${OWNER}.github.io"
          else
            BASE_URL="https://${OWNER}.github.io/${REPO_NAME}"
          fi

          python3 ./scripts/prepare_build_docs.py ./docs ./build-docs
          "$(go env GOPATH)/bin/minimaldoc" build ./build-docs \
            --base-url "$BASE_URL" \
            --output dist
          mkdir -p dist/brand
          cp build-docs/brand/* dist/brand/
          mkdir -p dist/img
          cp build-docs/img/* dist/img/
          cp build-docs/site.webmanifest dist/site.webmanifest
          python3 ./scripts/postprocess_landing.py dist
          cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
